name: Build standalone app (Windows/macOS/Linux)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libxkbcommon-x11-0 libxcb-cursor0

      - name: Install project dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .
          pip install pyinstaller==6.16.0

      - name: Build with PyInstaller
        run: pyinstaller build.spec --clean

      - name: Archive build output (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Compress-Archive -Path dist/LeafShapeTool/* -DestinationPath LeafShapeTool-windows.zip

      - name: Archive build output (macOS/Linux)
        if: matrix.os != 'windows-latest'
        run: |
          tar -C dist -czf LeafShapeTool-${{ matrix.os }}.tar.gz LeafShapeTool

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: LeafShapeTool-${{ matrix.os }}
          path: |
            LeafShapeTool-windows.zip
            LeafShapeTool-${{ matrix.os }}.tar.gz

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets (split files over 2GB)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets

          shopt -s globstar nullglob
          for file in artifacts/**/LeafShapeTool-windows.zip artifacts/**/LeafShapeTool-*.tar.gz; do
            [ -f "$file" ] || continue
            base="$(basename "$file")"
            size_bytes="$(stat -c%s "$file")"

            # GitHub release asset size limit is < 2 GiB
            if [ "$size_bytes" -ge 2147483648 ]; then
              echo "File is too large for a single release asset: $base (${size_bytes} bytes)"
              echo "Splitting into 1900MiB chunks..."
              split -b 1900m -d -a 3 "$file" "release-assets/${base}.part-"
            else
              cp "$file" "release-assets/$base"
            fi
          done

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
