project:
  type: website
  output-dir: _site # GitHub Actions artifact for Pages deployment
  preview:
    port: 3000
    browser: true

website:
  repo-url: https://github.com/maple60/leaf-contour-efd
  repo-subdir: website
  repo-actions: [edit, source, issue]
  title: "LeafContourEFD"
  navbar:
    tools:
      - icon: github
        menu:
          - text: Source Code
            href: https://github.com/maple60/leaf-contour-efd
    left:
      - text: "Home"
        href: index.qmd
      - text: "About"
        href: about.qmd
  sidebar:
    style: "docked"
    contents:
      - section: "Basics"
        contents:
        - text: "Installation"
          href: installation.qmd
        - text: "Usage"
          href: usage.qmd
        - text: "Analysis"
          href: analysis.qmd
      - section: "Appendix"
        contents:
        - text: "Related Tools and Frameworks"
          href: related_tools.qmd
        - text: "Build Instructions"
          href: build.qmd
  search: 
    location: sidebar
    type: textbox
  page-footer:
    left: "© 2025 LeafContourEFD"
    right: "Built with Quarto"

format:
  html:
    theme:
      - flatly
      - brand
    css: styles.css
    toc: true
    toc-depth: 3
    code-fold: true
    number-sections: false
    link-external-icon: true
    link-external-newwindow: true
    lang: en
